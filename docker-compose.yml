services:
  # COMPOSPHERE - Single lightweight container for everything (Static + WebSocket + Docker Engine)
  composphere:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-composphere}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:8080"      # HTTP UI
      - "127.0.0.1:${WORKER_PORT}:8081"   # WebSocket
    command: php src/server.php
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    networks:
      - bubble-net
    group_add:
      - "${DOCKER_GID:-999}"
    labels:
      - "composphere.core=true"

networks:
  bubble-net:
    driver: bridge
